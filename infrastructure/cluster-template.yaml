kind: Cluster
kubernetes:
  version: v1.35.3
name: talos-demo
features:
  enableWorkloadProxy: true
patches:
  - name: bootstrap-argocd
    inline:
      cluster:
        extraManifests:
          - https://raw.githubusercontent.com/matjahs/mssql-upgrade-demo/main/bootstrap/argocd-bootstrap-job.yaml
talos:
  version: v1.12.6
---
kind: ControlPlane
machineClass:
  name: vsphere-small
  size: 3
patches:
- inline:
    cluster:
      allowSchedulingOnControlPlanes: true
  name: cp-schedulable
---
kind: Workers
name: worker
machineClass:
  name: vsphere-small
  size: 2
patches:
  - file: infrastructure/patches/local-path-provisioner-volume.yaml

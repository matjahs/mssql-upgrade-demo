apiVersion: v1
kind: Secret
metadata:
  name: mssql
  namespace: sql-demo
type: Opaque
stringData:
  MSSQL_SA_PASSWORD: "ReplaceWithAStrongPassword123!"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mssql-data
  namespace: sql-demo
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mssql
  namespace: sql-demo
spec:
  type: LoadBalancer
  loadBalancerIP: 10.1.1.234
  selector:
    app: mssql
  ports:
    - name: tds
      port: 1433
      targetPort: 1433
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mssql
  namespace: sql-demo
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mssql
  template:
    metadata:
      labels:
        app: mssql
    spec:
      securityContext:
        fsGroup: 10001
      terminationGracePeriodSeconds: 120
      containers:
        - name: mssql
          image: mcr.microsoft.com/mssql/server:2025-latest
          securityContext:
            runAsUser: 10001
            capabilities:
              add:
                - SYS_PTRACE
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -ec
                  - >
                    /opt/mssql-tools18/bin/sqlcmd
                    -S localhost
                    -U sa
                    -P "${MSSQL_SA_PASSWORD}"
                    -No
                    -Q "SHUTDOWN WITH NOWAIT" || true;
                    while pgrep -x sqlservr >/dev/null; do sleep 1; done
          ports:
            - containerPort: 1433
              name: tds
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_PID
              value: "Developer"
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mssql
                  key: MSSQL_SA_PASSWORD
          readinessProbe:
            tcpSocket:
              port: 1433
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 1433
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /var/opt/mssql
          resources:
            requests:
              memory: "3Gi"
              cpu: "1500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mssql-data

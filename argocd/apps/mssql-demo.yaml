apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mssql-demo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/matjahs/mssql-upgrade-demo.git
    targetRevision: HEAD
    path: .
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

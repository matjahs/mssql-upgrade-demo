apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    omni-kube-service-exposer.sidero.dev/port: "53001"
    omni-kube-service-exposer.sidero.dev/label: Argo CD
    omni-kube-service-exposer.sidero.dev/prefix: argocd
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080
    - name: https
      port: 443
      protocol: TCP
      targetPort: 8080

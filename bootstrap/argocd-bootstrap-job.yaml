apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-bootstrap
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-bootstrap
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - argoproj.io
    resources:
      - applications
    verbs:
      - get
      - list
      - watch
      - create
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-bootstrap
subjects:
  - kind: ServiceAccount
    name: argocd-bootstrap
    namespace: default
---
apiVersion: batch/v1
kind: Job
metadata:
  name: argocd-bootstrap
  namespace: default
spec:
  backoffLimit: 12
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: argocd-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: kubectl
          image: registry.k8s.io/kubectl:v1.35.0
          command:
            - /bin/sh
            - -ec
            - |
              until kubectl get crd applications.argoproj.io >/dev/null 2>&1; do
                sleep 5
              done

              kubectl -n default wait --for=condition=Available deploy/argocd-application-controller --timeout=10m

              until kubectl -n default get service argocd-server >/dev/null 2>&1; do
                sleep 5
              done

              kubectl -n default annotate service argocd-server \
                omni-kube-service-exposer.sidero.dev/port="53001" \
                omni-kube-service-exposer.sidero.dev/label="Argo CD" \
                omni-kube-service-exposer.sidero.dev/prefix="argocd" \
                --overwrite

              kubectl apply -f https://raw.githubusercontent.com/matjahs/mssql-upgrade-demo/main/argocd/root-application.yaml
